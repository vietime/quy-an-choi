<!doctype html>
<html lang="vi">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#101820" />
    <title>Hand Catch Camera Game</title>
    <link rel="manifest" href="./manifest.webmanifest" />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="app">
      <section class="game-shell" aria-label="Hand Catch Camera Game">
        <video id="camera" playsinline muted autoplay></video>
        <canvas id="game" aria-label="Game canvas"></canvas>

        <div class="topbar">
          <div>
            <span class="label">Score</span>
            <strong id="score">0</strong>
          </div>
          <div>
            <span class="label">Time</span>
            <strong id="time">60</strong>
          </div>
          <div>
            <span class="label">Best</span>
            <strong id="best">0</strong>
          </div>
        </div>

        <div class="status" id="status">Nhan Bat dau de cap quyen camera</div>

        <section class="panel" id="panel">
          <h1>Hand Catch</h1>
          <p>Dung ban tay truoc camera de dieu khien vung sang va hung cac diem roi.</p>
          <button id="startButton" type="button" onclick="window.startHandCatchGame && window.startHandCatchGame(event)">Bat dau</button>
          <button id="switchButton" type="button" class="secondary" onclick="window.switchHandCatchCamera && window.switchHandCatchCamera(event)">Doi camera</button>
          <p class="hint">Can HTTPS khi test tren dien thoai. Localhost van duoc ho tro tren may tinh.</p>
        </section>
      </section>
    </main>

    <script>
      window.HAND_CATCH_VERSION = "v4";
      document.addEventListener("DOMContentLoaded", function () {
        var status = document.querySelector("#status");
        if (status) status.textContent = "Nhan Bat dau de cap quyen camera";
      });
    </script>
    <script src="./src/main.js?v=4"></script>
  </body>
</html>
